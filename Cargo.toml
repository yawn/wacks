[package]
name = "wacks"
version = "0.1.0"
edition = "2024"
description = "Structured WASM panic stack traces for browsers"
license = "MIT OR Apache-2.0"

[dependencies]
cfg-if = "1"
leb128 = { version = "0.2", optional = true }
rustc-demangle = "0.1"
serde = { version = "1", features = ["derive"], optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"

[features]
default = []
name-section = ["dep:leb128"]
serde = ["dep:serde"]
