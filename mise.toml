[tools]
"cargo:cargo-nextest" = "latest"
"cargo:wasm-bindgen-cli" = "latest"
"cargo:wasm-pack" = "latest"
"npm:playwright" = "latest"
node = "lts"
rust = "latest"

[hooks]
postinstall = "cd tests/e2e && npm install && npx playwright install --with-deps chromium firefox webkit"

[tasks."build:e2e"]
description = "Build the WASM fixture for e2e tests"
dir = "tests/e2e"
run = """
wasm-pack build fixture --target web --out-dir ../static/pkg
cargo run --bin sourcemap-gen --features sourcemap-gen --manifest-path ../../Cargo.toml --target "$(rustc -vV | awk '/^host:/ { print $2 }')" -- static/pkg/wacks_test_fixture_bg.wasm static/pkg/wacks_test_fixture_bg.wasm.map
cargo run --bin framemap-gen --features framemap-gen --manifest-path ../../Cargo.toml --target "$(rustc -vV | awk '/^host:/ { print $2 }')" -- static/pkg/wacks_test_fixture_bg.wasm static/pkg/wacks_test_fixture_bg.framemap
"""

[tasks."test:unit"]
description = "Run unit tests on the native target"
run = "cargo nextest run --target $(rustc -vV | awk '/^host:/ { print $2 }')"

[tasks."test:e2e"]
description = "Run Playwright end-to-end tests across browsers"
depends = ["build:e2e"]
dir = "tests/e2e"
run = "npx playwright test"
